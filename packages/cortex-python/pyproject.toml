[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nfinitmonkeys-cortex-sdk"
version = "1.2.0"
description = "Official Python SDK for the Cortex LLM Gateway API by InfiniteMonkeys"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "InfiniteMonkeys" },
]
keywords = ["cortex", "llm", "ai", "sdk", "gateway"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.24.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "respx>=0.20",
    "coverage>=7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["cortex_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py39"
line-length = 100
